name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  build:
    # Keep the ".x" suffix so the job name matches the branch-protection
    # required contexts ("Node 20.x" etc.). mise resolves e.g. "20" to the
    # latest 20.x, so the label stays accurate.
    name: 'Node ${{ matrix.node-version }}.x'

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          mise_toml: |
            [tools]
            node = "${{ matrix.node-version }}"
      - name: install dependencies
        run: npm ci
      - run: npm test

  release-it-compat:
    name: 'release-it@${{ matrix.release-it-version }}'

    runs-on: ubuntu-latest

    strategy:
      matrix:
        release-it-version:
          ['^17.0.0', '^18.0.0', '^19.0.0', '^20.0.0']

    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      # Resolve dependencies from scratch with the target release-it version.
      # Swapping release-it in an existing lockfile/tree can leave vitest's
      # optional native rolldown binary uninstalled; a clean resolution (on the
      # mise-pinned Node, which is new enough for it) installs it correctly.
      - name: install dependencies
        run: |
          rm -f package-lock.json
          npm install --save-dev release-it@${{ matrix.release-it-version }}
      - run: npm test
