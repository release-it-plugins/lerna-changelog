name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  build:
    name: 'Node ${{ matrix.node-version }}'

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v6
      - uses: volta-cli/action@v5
        with:
          node-version: ${{ matrix.node-version }}
      - name: install dependencies
        run: npm ci
      - run: npm test

  release-it-compat:
    name: 'release-it@${{ matrix.release-it-version }}'

    runs-on: ubuntu-latest

    strategy:
      matrix:
        release-it-version:
          ['^17.0.0', '^18.0.0', '^19.0.0', '^20.0.0']

    steps:
      - uses: actions/checkout@v6
      - uses: volta-cli/action@v5
      # Resolve dependencies from scratch with the target release-it version.
      # Swapping release-it in an existing lockfile/tree can leave vitest's
      # optional native rolldown binary uninstalled; a clean resolution (on the
      # volta-pinned Node, which is new enough for it) installs it correctly.
      - name: install dependencies
        run: |
          rm -f package-lock.json
          npm install --save-dev release-it@${{ matrix.release-it-version }}
      - run: npm test
